<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#/" class="brand">
        <span class="brand-mark">🏃</span>
        <span class="brand-name">Run Catalog</span>
      </a>
      <input id="search" type="search" placeholder="Rechercher un site, une marque, un tag..." autocomplete="off" />
    </div>
  </header>

  <main id="app" class="container">
    <p class="loading">Chargement…</p>
  </main>

  <a class="contribute-fab" data-bind="repoUrl" target="_blank" rel="noopener">Proposer un site ?</a>

  <template id="tpl-home">
    <section class="hero">
      <h1 data-bind="title"></h1>
      <p class="tagline" data-bind="tagline"></p>
      <p class="intro" data-bind="intro"></p>
    </section>
    <div class="tag-filter-bar" data-bind="tagFilter"></div>
    <section class="categories-layout" data-bind="categories"></section>
  </template>

  <template id="tpl-category-panel">
    <section class="category-panel">
      <header class="panel-header">
        <span class="category-icon" data-bind="icon"></span>
        <div>
          <h2><a data-bind="anchorHref"><span data-bind="name"></span></a></h2>
          <p data-bind="description"></p>
        </div>
        <span class="category-count" data-bind="count"></span>
      </header>
      <ol class="site-list compact" data-bind="sites"></ol>
    </section>
  </template>

  <template id="tpl-category">
    <nav class="breadcrumb">
      <a href="#/">Accueil</a> <span>›</span> <span data-bind="name"></span>
    </nav>
    <section class="category-header">
      <span class="category-icon big" data-bind="icon"></span>
      <div>
        <h1 data-bind="name"></h1>
        <p data-bind="description"></p>
      </div>
    </section>
    <ol class="site-list" data-bind="sites"></ol>
  </template>

  <template id="tpl-site-row">
    <li class="site-row">
      <span class="rank" data-bind="rank"></span>
      <div class="site-main">
        <a class="site-name" target="_blank" rel="noopener" data-bind="siteUrl"><span data-bind="name"></span></a>
        <p class="site-desc" data-bind="description"></p>
      </div>
      <a class="site-visit" target="_blank" rel="noopener" data-bind="url" aria-label="Visiter">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </a>
    </li>
  </template>

  <template id="tpl-search-results">
    <section class="bound">
      <h1>Résultats</h1>
      <p data-bind="summary"></p>
      <ol class="site-list" data-bind="results"></ol>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
